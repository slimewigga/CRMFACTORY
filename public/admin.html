<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — Деньги-Бабки CRM</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/ui.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="admin-layout">
    <header class="admin-header">
      <div class="admin-header-left">
        <a href="/app.html" class="btn btn-sm btn-secondary">← CRM</a>
        <h1>⚙️ Админ-панель</h1>
      </div>
      <div class="admin-header-right">
        <span id="adminUserName"></span>
        <button class="btn btn-sm btn-secondary" id="adminLogout">Выйти</button>
      </div>
    </header>

    <main class="admin-main">
      <div class="stats-grid admin-stats" id="adminStats"></div>

      <div class="card">
        <div class="admin-section-header">
          <h2>👥 Пользователи</h2>
        </div>
        <div class="table-wrap">
          <table class="admin-table" id="usersTable">
            <thead>
              <tr>
                <th>Пользователь</th>
                <th>Email</th>
                <th>Роль</th>
                <th>Статус</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Заголовок</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script src="/js/ui.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
